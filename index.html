<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
</head>
<body>
  <header>
    <h1>Reminder</h1>
    <div class="header-actions" style="display: flex; gap: 0.5rem; align-items: center;">
      <!-- Notification Toggle Button -->
      <button id="notification-toggle-btn" class="toggle-btn-inactive" title="Toggle Notifications">🔔 Off</button>
      <!-- Edit Mode Toggle Switch -->
      <button id="edit-mode-toggle" class="toggle-btn-inactive">Edit Mode: Off</button>
    </div>
  </header>

  <main>
    <!-- Today's View Grid -->
    <section id="daily-view-section">
      <div id="buttons-container">
        <!-- Active task buttons and the Green creation button render here dynamically -->
      </div>
    </section>

    <!-- Collapsible History View -->
    <section id="history-section">
      <h2 id="history-toggle-header" style="cursor: pointer; user-select: none;">
        History <span id="toggle-arrow">►</span>
      </h2>
      <div id="history-log" class="hidden"></div>
    </section>
  </main>

  <!-- Streamlined Task Creation/Editing Modal -->
  <div id="task-modal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modal-heading">Task</h3>
      <form id="task-form">
        <!-- Hidden input to store task ID when editing -->
        <input type="hidden" id="edit-task-id">

        <!-- ROW 1: Title -->
        <div class="form-row">
          <label for="task-title">Title</label>
          <input type="text" id="task-title" required placeholder="e.g., Take Medicine">
        </div>

        <!-- ROW 2: Time -->
        <div class="form-row">
          <label for="task-time-text">Time</label>
          <div class="time-picker-wrapper">
            <input type="text" id="task-time-text" required placeholder="e.g., Morning or 08:00" autocomplete="off">
            <button type="button" id="clock-trigger-btn" title="Choose specific clock time">⏰</button>
            <input type="time" id="hidden-clock-input" class="hidden-picker">
          </div>
          <!-- Thumb-friendly mobile suggestions grid -->
          <div id="time-suggestions" class="suggestions-box hidden">
            <button type="button" class="chip">Morning</button>
            <button type="button" class="chip">After Waking</button>
            <button type="button" class="chip">Breakfast</button>
            <button type="button" class="chip">Midday</button>
            <button type="button" class="chip">Lunch</button>
            <button type="button" class="chip">Evening</button>
            <button type="button" class="chip">Dinner</button>
            <button type="button" class="chip">Night</button>
            <button type="button" class="chip">Before Sleeping</button>
          </div>
        </div>

        <!-- ROW 3: Repeat Options -->
        <div class="form-row">
          <label>Repeat</label>
          <div class="repeat-container">
            <div class="days-checkboxes">
              <label class="chk-lbl"><input type="checkbox" value="0"> Su</label>
              <label class="chk-lbl"><input type="checkbox" value="1"> Mo</label>
              <label class="chk-lbl"><input type="checkbox" value="2"> Tu</label>
              <label class="chk-lbl"><input type="checkbox" value="3"> We</label>
              <label class="chk-lbl"><input type="checkbox" value="4"> Th</label>
              <label class="chk-lbl"><input type="checkbox" value="5"> Fr</label>
              <label class="chk-lbl"><input type="checkbox" value="6"> Sa</label>
              <label class="chk-lbl daily-label"><input type="checkbox" id="daily-checkbox"> Daily</label>
            </div>
            
            <div class="date-bounds-wrapper" style="margin-top: 0.6rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center;">
              <!-- Start Date Element -->
              <div class="date-btn-group">
                <button type="button" id="start-toggle-btn" class="btn-small">Start</button>
                <input type="date" id="hidden-start-date" class="hidden-picker">
                <span id="selected-start-span" class="date-badge hidden"></span>
              </div>

              <!-- Until Date Element -->
              <div class="date-btn-group">
                <button type="button" id="until-toggle-btn" class="btn-small">Until</button>
                <input type="date" id="hidden-until-date" class="hidden-picker">
                <span id="selected-until-span" class="date-badge hidden"></span>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-actions" id="modal-actions-container">
          <button type="button" id="delete-task-btn" class="btn-danger hidden">Delete Task</button>
          <div style="flex-grow: 1;"></div>
          <button type="button" id="close-modal-btn" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
