<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
</head>
<body>
  <header>
    <h1>Day Tracker</h1>
  </header>

  <main>
    <!-- Today's View Dashboard Grid -->
    <section id="daily-view-section">
      <div id="buttons-container">
        <!-- Task buttons and the Green creation button render here -->
      </div>
    </section>

    <!-- Collapsible History View -->
    <section id="history-section">
      <h2 id="history-toggle-header" style="cursor: pointer; user-select: none;">
        History <span id="toggle-arrow">►</span>
      </h2>
      <div id="history-log" class="hidden"></div>
    </section>
  </main>

  <!-- Streamlined Task Creation Modal -->
  <div id="task-modal" class="modal hidden">
    <div class="modal-content">
      <h3>New</h3>
      <form id="task-form">
        <!-- ROW 1: Title -->
        <div class="form-row">
          <label for="task-title">Title</label>
          <input type="text" id="task-title" required placeholder="e.g., Take Medicine">
        </div>

        <!-- ROW 2: Time (Text input + native clock picker button overlay) -->
        <div class="form-row">
          <label for="task-time-text">Time</label>
          <div class="time-picker-wrapper">
            <input type="text" id="task-time-text" required placeholder="e.g., Morning or 08:00">
            <button type="button" id="clock-trigger-btn" title="Choose specific clock time">⏰</button>
            <input type="time" id="hidden-clock-input" class="hidden-picker">
          </div>
        </div>

        <!-- ROW 3: Repeat Options -->
        <div class="form-row">
          <label>Repeat</label>
          <div class="repeat-container">
            <div class="days-checkboxes">
              <label class="chk-lbl"><input type="checkbox" value="0"> Su</label>
              <label class="chk-lbl"><input type="checkbox" value="1"> Mo</label>
              <label class="chk-lbl"><input type="checkbox" value="2"> Tu</label>
              <label class="chk-lbl"><input type="checkbox" value="3"> We</label>
              <label class="chk-lbl"><input type="checkbox" value="4"> Th</label>
              <label class="chk-lbl"><input type="checkbox" value="5"> Fr</label>
              <label class="chk-lbl"><input type="checkbox" value="6"> Sa</label>
              <label class="chk-lbl daily-label"><input type="checkbox" id="daily-checkbox"> Daily</label>
            </div>
            
            <div class="until-date-wrapper">
              <button type="button" id="until-toggle-btn" class="btn-small">Until</button>
              <input type="date" id="hidden-until-date" class="hidden-picker">
              <span id="selected-until-span" class="hidden"></span>
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" id="close-modal-btn" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
